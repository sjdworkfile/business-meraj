<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>املاک معراج - Business Meraj</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #1f2937;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            margin: 0;
            color: #1e40af;
            font-size: 28px;
        }
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #1e40af;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background: #1e3a8a;
        }
        .add-btn {
            background: #22c55e;
        }
        .table-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            font-weight: 600;
        }
        .status-sale { color: #22c55e; font-weight: bold; }
        .status-rent { color: #3b82f6; font-weight: bold; }
        .status-rahm { color: #8b5cf6; font-weight: bold; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🏠 املاک معراج</h1>
                <p>Business Meraj - مدیریت حرفه‌ای املاک</p>
            </div>
            <div>
                <button onclick="showAddModal()" class="add-btn">+ ثبت ملک جدید</button>
            </div>
        </header>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="جستجو در املاک..." onkeyup="filterProperties()" style="flex: 1; min-width: 250px;">
            <select id="typeFilter" onchange="filterProperties()">
                <option value="">همه معاملات</option>
                <option value="فروش">فروش</option>
                <option value="اجاره">اجاره</option>
                <option value="رهن">رهن</option>
            </select>
            <button onclick="exportData()">📥 اکسپورت پشتیبان</button>
            <button onclick="document.getElementById('importInput').click()">📤 ایمپورت</button>
            <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
        </div>

        <div class="table-container">
            <table id="propertiesTable">
                <thead>
                    <tr>
                        <th>کد ملک</th>
                        <th>عنوان</th>
                        <th>منطقه</th>
                        <th>نوع معامله</th>
                        <th>قیمت (تومان)</th>
                        <th>متراژ</th>
                        <th>اتاق</th>
                        <th>وضعیت</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal for adding/editing property -->
    <div id="propertyModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">ثبت ملک جدید</h2>
            <form id="propertyForm">
                <input type="hidden" id="editIndex">
                <label>عنوان ملک:</label>
                <input type="text" id="title" required><br><br>
                
                <label>منطقه:</label>
                <input type="text" id="area" required><br><br>
                
                <label>نوع معامله:</label>
                <select id="type">
                    <option value="فروش">فروش</option>
                    <option value="اجاره">اجاره</option>
                    <option value="رهن">رهن</option>
                </select><br><br>
                
                <label>قیمت (تومان):</label>
                <input type="number" id="price" required><br><br>
                
                <label>متراژ (متر مربع):</label>
                <input type="number" id="size" required><br><br>
                
                <label>تعداد اتاق:</label>
                <input type="number" id="rooms" value="2"><br><br>
                
                <label>توضیحات:</label>
                <textarea id="description" rows="3" style="width:100%"></textarea><br><br>
                
                <button type="button" onclick="saveProperty()">ذخیره ملک</button>
                <button type="button" onclick="closeModal()" style="background:#ef4444;">انصراف</button>
            </form>
        </div>
    </div>

    <script>
        let properties = JSON.parse(localStorage.getItem('merajProperties')) || [];

        function saveToLocal() {
            localStorage.setItem('merajProperties', JSON.stringify(properties));
        }

        function renderTable(filteredProperties = properties) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            filteredProperties.forEach((prop, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${prop.id || index + 1001}</td>
                    <td>${prop.title}</td>
                    <td>${prop.area}</td>
                    <td><span class="status-${prop.type === 'فروش' ? 'sale' : prop.type === 'اجاره' ? 'rent' : 'rahm'}">${prop.type}</span></td>
                    <td>${Number(prop.price).toLocaleString('fa-IR')}</td>
                    <td>${prop.size} متر</td>
                    <td>${prop.rooms}</td>
                    <td>${prop.description ? prop.description.substring(0, 40) + '...' : '-'}</td>
                    <td>
                        <button onclick="editProperty(${index})" style="background:#eab308; margin-left:5px;">ویرایش</button>
                        <button onclick="deleteProperty(${index})" style="background:#ef4444;">حذف</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'ثبت ملک جدید';
            document.getElementById('propertyForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('propertyModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('propertyModal').style.display = 'none';
        }

        function saveProperty() {
            const editIndex = document.getElementById('editIndex').value;
            const property = {
                title: document.getElementById('title').value,
                area: document.getElementById('area').value,
                type: document.getElementById('type').value,
                price: document.getElementById('price').value,
                size: document.getElementById('size').value,
                rooms: document.getElementById('rooms').value,
                description: document.getElementById('description').value
            };

            if (editIndex !== '') {
                properties[editIndex] = property;
            } else {
                properties.push(property);
            }

            saveToLocal();
            renderTable();
            closeModal();
        }

        function editProperty(index) {
            const prop = properties[index];
            document.getElementById('modalTitle').textContent = 'ویرایش ملک';
            document.getElementById('editIndex').value = index;
            
            document.getElementById('title').value = prop.title;
            document.getElementById('area').value = prop.area;
            document.getElementById('type').value = prop.type;
            document.getElementById('price').value = prop.price;
            document.getElementById('size').value = prop.size;
            document.getElementById('rooms').value = prop.rooms;
            document.getElementById('description').value = prop.description || '';
            
            document.getElementById('propertyModal').style.display = 'block';
        }

        function deleteProperty(index) {
            if (confirm('آیا مطمئن هستید که این ملک حذف شود؟')) {
                properties.splice(index, 1);
                saveToLocal();
                renderTable();
            }
        }

        function filterProperties() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;

            const filtered = properties.filter(prop => {
                const matchesSearch = prop.title.toLowerCase().includes(searchTerm) || 
                                    prop.area.toLowerCase().includes(searchTerm) ||
                                    (prop.description && prop.description.toLowerCase().includes(searchTerm));
                const matchesType = !typeFilter || prop.type === typeFilter;
                return matchesSearch && matchesType;
            });

            renderTable(filtered);
        }

        function exportData() {
            const dataStr = JSON.stringify(properties, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'business-meraj-backup.json';

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    properties = JSON.parse(e.target.result);
                    saveToLocal();
                    renderTable();
                    alert('اطلاعات با موفقیت وارد شد!');
                } catch (err) {
                    alert('خطا در خواندن فایل!');
                }
            };
            reader.readAsText(file);
        }

        // Initial render
        renderTable();
    </script>
</body>
</html>
